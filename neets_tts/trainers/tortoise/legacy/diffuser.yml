# From /g/, https://pastebin.com/Vi47rVcE, tts_flat_autoregressive_inputs.yml

# Notes:
#### general settings
name: tts_flat_autoregressive_inputs_r3_long
use_tb_logger: true
model: extensibletrainer
distortion: sr
scale: 1
gpu_ids: [0,1,2,3,4,5,6,7]
start_step: 0
force_start_step: 39000
checkpointing_enabled: true
grad_scaler_enabled: false
fp16: false
wandb: true
wandb_run_name: tts_flat_autoregressive_inputs_r2
wandb_step_factor: 1
wandb_project_name: train_diffusion_tts_mel

datasets:
  train:
    name: clips
    n_workers: 2
    batch_size: 512
    mode: fast_paired_voice_audio
    sample_rate: 22050
    path: [/y/libritts/train-other-500/transcribed-oco-realtext.tsv,
           /y/libritts/train-clean-100/transcribed-oco-realtext.tsv,
           /y/libritts/train-clean-360/transcribed-oco-realtext.tsv,
           /y/clips/podcasts-0/transcribed-oco.tsv,
           /y/clips/books1/transcribed-oco.tsv,
           /y/clips/books2/transcribed-oco.tsv,
	       /y/bigasr_dataset/hifi_tts/transcribed-oco-realtext.tsv,
           /y/clips/podcasts-0/transcribed-oco.tsv,
           /y/clips/podcasts-1/transcribed-oco.tsv,
           ]
    max_wav_length: 220500
    max_text_length: 999
    load_conditioning: true
    num_conditioning_candidates: 1
    conditioning_length: 102400
    needs_collate: false
    use_bpe_tokenizer: true
    load_aligned_codes: false
  val:
    name: mass_test
    n_workers: 1
    batch_size: 6
    mode: paired_voice_audio
    sample_rate: 22050
    path: [/y/bigasr_dataset/librispeech/val/transcribed-oco.tsv]
    fetcher_mode: [tsv]
    max_wav_length: 220500
    max_text_length: 160
    load_conditioning: true
    num_conditioning_candidates: 1
    conditioning_length: 102400
    needs_collate: false
    use_bpe_tokenizer: true
    load_aligned_codes: false

networks:
  generator:
    type: generator
    which_model_G: diffusion_tts_flat
    kwargs:
      model_channels: 1024
      num_layers: 10
      in_channels: 100
      out_channels: 200
      in_latent_channels: 1024
      in_tokens: 8193
      dropout: .1
      use_fp16: false
      num_heads: 16
      layer_drop: 0
      unconditioned_percentage: 0.1

#### path
path:
  pretrain_model_generator: ../experiments/tts_flat_autoregressive_inputs_r2/models/39000_generator_ema.pth
  strict_load: true
  #resume_state: ../experiments/tts_flat_autoregressive_inputs_r2/training_state/39000.state

steps:
  generator:
    training: generator
    loss_log_buffer: 2000
    step_outputs: [loss]

    optimizer: adamw
    optimizer_params:
      lr: !!float 1e-5
      weight_decay: 0.001
      beta1: 0.9
      beta2: 0.98
    clip_grad_eps: 5.0

    injectors:
      to_mel:
        type: torch_mel_spectrogram
        mel_norm_file: ../experiments/clips_mel_norms.pth
        in: wav
        out: mel
      #to_codes:
      #  type: discrete_token
      #  in: mel
      #  out: mel_codes
      # Use two different MEL types here because torch & tacotron MEL functions are slightly different
      # and the vocoder I want to use was trained on tacotron MELs (while my DVAE uses the torch implementation)
      resample_wav:
        type: audio_resample
        in: wav
        out: wav_for_vocoder
        input_sample_rate: 22050
        output_sample_rate: 24000
      tacotron_mel:
        type: mel_spectrogram
        mel_fmax: 12000
        sampling_rate: 24000
        n_mel_channels: 100
        # Only normalize the MEL target, because the diffuser specifically cares about it.
        do_normalization: true
        in: wav_for_vocoder
        out: target_mel
      resample_cond:
        type: for_each
        subtype: audio_resample
        input_sample_rate: 22050
        output_sample_rate: 24000
        in: conditioning
        out: conditioning_for_vocoder
      cond_to_mel:
        type: for_each
        subtype: mel_spectrogram
        mel_fmax: 12000
        sampling_rate: 24000
        n_mel_channels: 100
        in: conditioning_for_vocoder
        out: cond_mel
      produce_latents:
        type: gpt_voice_latent
        gpt_path: ../experiments/unified_large_diverse_basis.pth
        in: wav
        conditioning_clip: conditioning
        text: padded_text
        text_lengths: text_lengths
        input_lengths: wav_lengths
        out: gpt_latent
      diffusion:
        type: gaussian_diffusion
        in: target_mel
        generator: generator
        beta_schedule:
          schedule_name: linear
          num_diffusion_timesteps: 4000
        diffusion_args:
          model_mean_type: epsilon
          model_var_type: learned_range
          loss_type: mse
        sampler_type: uniform
        model_input_keys:
          aligned_conditioning: gpt_latent
          conditioning_input: cond_mel
          return_code_pred: true
        extra_model_output_keys: [mel_pred]
        out: loss
        out_key_vb_loss: vb_loss
        out_key_x_start: x_start_pred
    losses:
      diffusion_loss:
        after: 500
        type: direct
        weight: 1
        key: loss
      var_loss:
        after: 500
        type: direct
        weight: 1
        key: vb_loss

train:
  niter: 500000
  warmup_iter: 0  # This needs to be removed since it merely duplicates warmup_steps.
  mega_batch_factor: 16
  val_freq: 500
  sort_key: wav_lengths
  auto_collate: true

  # Default LR scheduler options
  default_lr_scheme: MultiStepLR
  gen_lr_steps: [ 99999999 ]  #AKA NEVER
  lr_gamma: 0.2
  #force_lr: !!float 1e-3
  warmup_steps: 0
  ema_rate: .9995
  #ema_on_cpu: true

eval:
  pure: false
  evaluators:
    fid:
      for: generator
      type: audio_diffusion_fid
      eval_tsv: /y/libritts/test-clean/transcribed-brief-w2v.tsv
      diffusion_steps: 50
      diffusion_schedule: linear
      diffusion_type: tts9_mel_autoin
      conditioning_free: false
      conditioning_free_k: 1

logger:
  print_freq: 5
  save_checkpoint_freq: 500